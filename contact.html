<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — Nasrin Akter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Playfair Display"', 'serif'],
            sans: ['"DM Sans"', 'sans-serif'],
          },
          colors: {
            ink: '#111111',
            soft: '#f5f3ef',
            accent: '#c8a96e',
            muted: '#888880',
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.9s ease both; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
  </style>
</head>
<body class="font-sans bg-soft text-ink overflow-x-hidden">

  <!-- ── NAVBAR ── -->
  <nav id="navbar" class="fixed top-0 left-0 right-0 z-[100] flex items-center justify-between px-[5%] py-[1.4rem] bg-soft/85 backdrop-blur-[12px] border-b border-black/[0.06] transition-shadow duration-300">
    <a href="index.html" class="font-display text-[1.35rem] font-black tracking-[-0.02em] text-ink no-underline">N<span class="text-accent">.</span>A</a>
    <ul class="hidden md:flex gap-10 list-none">
      <li><a href="index.html" class="text-[0.85rem] font-medium tracking-[0.08em] uppercase text-muted no-underline relative transition-colors hover:text-ink after:content-[''] after:absolute after:-bottom-[3px] after:left-0 after:w-0 after:h-[1.5px] after:bg-accent after:transition-all hover:after:w-full">Home</a></li>
      <li><a href="about.html" class="text-[0.85rem] font-medium tracking-[0.08em] uppercase text-muted no-underline relative transition-colors hover:text-ink after:content-[''] after:absolute after:-bottom-[3px] after:left-0 after:w-0 after:h-[1.5px] after:bg-accent after:transition-all hover:after:w-full">About Me</a></li>
      <li><a href="contact.html" class="text-[0.85rem] font-medium tracking-[0.08em] uppercase text-ink no-underline relative after:content-[''] after:absolute after:-bottom-[3px] after:left-0 after:w-full after:h-[1.5px] after:bg-accent">Contact Me</a></li>
    </ul>
    <button class="hamburger md:hidden flex flex-col gap-[5px] cursor-pointer p-1 bg-transparent border-none" id="hamburger" aria-label="Menu">
      <span class="block w-[22px] h-0.5 bg-ink rounded-sm transition-all duration-300"></span>
      <span class="block w-[22px] h-0.5 bg-ink rounded-sm transition-all duration-300"></span>
      <span class="block w-[22px] h-0.5 bg-ink rounded-sm transition-all duration-300"></span>
    </button>
  </nav>

  <div class="hidden md:hidden fixed top-[70px] left-0 right-0 bg-soft/98 backdrop-blur-[12px] border-b border-black/[0.06] px-[5%] py-6 z-[99] flex-col gap-5" id="mobileMenu">
    <a href="index.html" onclick="closeMenu()" class="text-[0.9rem] font-medium tracking-[0.08em] uppercase text-ink no-underline py-2 border-b border-black/[0.06]">Home</a>
    <a href="about.html" onclick="closeMenu()" class="text-[0.9rem] font-medium tracking-[0.08em] uppercase text-ink no-underline py-2 border-b border-black/[0.06]">About Me</a>
    <a href="contact.html" onclick="closeMenu()" class="text-[0.9rem] font-medium tracking-[0.08em] uppercase text-ink no-underline py-2">Contact Me</a>
  </div>

  <!-- ── CONTACT SECTION ── -->
  <section id="contact" class="min-h-screen flex items-center px-[5%] pt-[120px] pb-20 relative bg-[linear-gradient(rgba(0,0,0,0.03)_1px,transparent_1px),linear-gradient(90deg,rgba(0,0,0,0.03)_1px,transparent_1px)] bg-[length:40px_40px]">
    <div class="fade-up max-w-[1100px] mx-auto w-full flex flex-col md:flex-row items-stretch gap-10 md:gap-20">

      <!-- Left: ID Card -->
      <div class="w-full md:w-[clamp(260px,30vw,340px)] flex flex-col flex-shrink-0">
        <div class="inline-flex items-center gap-[0.6rem] text-[0.78rem] font-medium tracking-[0.14em] uppercase text-accent mb-[1.2rem]">
          <span class="block w-7 h-[1.5px] bg-accent"></span>Get In Touch
        </div>
        <div class="relative bg-white border-[1.5px] border-black/[0.08] rounded-xl px-[1.75rem] py-8 flex-1 shadow-[0_8px_40px_rgba(0,0,0,0.07)] overflow-hidden">
          <div class="absolute top-0 left-0 right-0 h-[5px] bg-gradient-to-r from-accent to-[#e8c97e]"></div>

          <div class="w-[90px] h-[90px] rounded-full bg-gradient-to-br from-[#e8e4dc] to-[#d4cfc5] border-[3px] border-accent flex items-center justify-center mx-auto mt-2 mb-5">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" class="w-10 h-10 opacity-40">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </div>

          <div class="font-display text-[1.3rem] font-black text-center text-ink mb-1">Nasrin Akter</div>
          <div class="text-[0.78rem] font-medium tracking-[0.1em] uppercase text-accent text-center mb-6">Software Engineer</div>
          <div class="h-px bg-black/[0.07] mb-6"></div>

          <div class="flex items-center gap-3 mb-4">
            <div class="w-8 h-8 bg-soft rounded-md flex items-center justify-center flex-shrink-0">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-[15px] h-[15px] text-accent"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>
            <div><div class="text-[0.68rem] font-medium tracking-[0.08em] uppercase text-muted">Email</div><div class="text-[0.82rem] text-[#555] break-all">nahin4383@gmail.com</div></div>
          </div>
          <div class="flex items-center gap-3 mb-4">
            <div class="w-8 h-8 bg-soft rounded-md flex items-center justify-center flex-shrink-0">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-[15px] h-[15px] text-accent"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
            </div>
            <div><div class="text-[0.68rem] font-medium tracking-[0.08em] uppercase text-muted">Phone</div><div class="text-[0.82rem] text-[#555]">01847353943</div></div>
          </div>
          <div class="flex items-center gap-3 mb-4">
            <div class="w-8 h-8 bg-soft rounded-md flex items-center justify-center flex-shrink-0">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-[15px] h-[15px] text-accent"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
            </div>
            <div><div class="text-[0.68rem] font-medium tracking-[0.08em] uppercase text-muted">Location</div><div class="text-[0.82rem] text-[#555]">Chattogram, Bangladesh</div></div>
          </div>
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-soft rounded-md flex items-center justify-center flex-shrink-0">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-[15px] h-[15px] text-accent"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844a9.59 9.59 0 012.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12c0-5.523-4.477-10-10-10z"/></svg>
            </div>
            <div><div class="text-[0.68rem] font-medium tracking-[0.08em] uppercase text-muted">GitHub</div><div class="text-[0.82rem] text-[#555] break-all">github.com/Naahin</div></div>
          </div>

        </div>
      </div>

      <!-- Right: Form -->
      <div class="flex-1">

        <div class="flex flex-col sm:flex-row gap-4 mb-4">
          <div class="flex flex-col flex-1 gap-[0.4rem]">
            <label class="text-[0.75rem] font-medium tracking-[0.1em] uppercase text-muted">First Name</label>
            <input type="text" class="px-4 py-[0.85rem] bg-white border-[1.5px] border-black/10 rounded text-[0.92rem] text-ink outline-none focus:border-accent focus:ring-[3px] focus:ring-accent/15 w-full" placeholder="Rebeka" id="firstName"/>
          </div>
          <div class="flex flex-col flex-1 gap-[0.4rem]">
            <label class="text-[0.75rem] font-medium tracking-[0.1em] uppercase text-muted">Last Name</label>
            <input type="text" class="px-4 py-[0.85rem] bg-white border-[1.5px] border-black/10 rounded text-[0.92rem] text-ink outline-none focus:border-accent focus:ring-[3px] focus:ring-accent/15 w-full" placeholder="Sultana" id="lastName"/>
          </div>
        </div>

        <div class="flex flex-col gap-[0.4rem] mb-4">
          <label class="text-[0.75rem] font-medium tracking-[0.1em] uppercase text-muted">Email</label>
          <input type="email" class="px-4 py-[0.85rem] bg-white border-[1.5px] border-black/10 rounded text-[0.92rem] text-ink outline-none focus:border-accent focus:ring-[3px] focus:ring-accent/15 w-full" placeholder="rebekas@email.com" id="email"/>
        </div>

        <div class="flex flex-col gap-[0.4rem] mb-4">
          <label class="text-[0.75rem] font-medium tracking-[0.1em] uppercase text-muted">Phone Number</label>
          <input type="tel" class="px-4 py-[0.85rem] bg-white border-[1.5px] border-black/10 rounded text-[0.92rem] text-ink outline-none focus:border-accent focus:ring-[3px] focus:ring-accent/15 w-full" id="phone"/>
        </div>

        <div class="flex flex-col gap-[0.4rem]">
          <label class="text-[0.75rem] font-medium tracking-[0.1em] uppercase text-muted">Message</label>
          <textarea class="px-4 py-[0.85rem] bg-white border-[1.5px] border-black/10 rounded text-[0.92rem] text-ink outline-none focus:border-accent focus:ring-[3px] focus:ring-accent/15 w-full resize-y min-h-[130px] mb-4" placeholder="Write your message here..." id="message"></textarea>
        </div>

        <button class="relative overflow-hidden w-full py-4 text-[0.88rem] font-medium tracking-[0.1em] uppercase text-soft bg-ink border-[1.5px] border-ink rounded cursor-pointer transition-colors hover:text-ink hover:border-accent group" onclick="handleSend()">
          <span class="absolute inset-0 bg-accent -translate-x-full transition-transform duration-300 group-hover:translate-x-0"></span>
          <span class="relative z-10">Send Message</span>
        </button>

        <div class="hidden mt-4 px-4 py-[0.85rem] bg-[#f0fdf4] border-[1.5px] border-[#86efac] rounded text-[0.88rem] text-[#16a34a] text-center" id="successMsg">
          ✓ Message sent! I'll get back to you soon.
        </div>

      </div>
    </div>
  </section>

  <script>
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
      navbar.classList.toggle('shadow-[0_4px_24px_rgba(0,0,0,0.07)]', window.scrollY > 10);
    });

    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      mobileMenu.classList.toggle('hidden');
      mobileMenu.classList.toggle('flex');
    });
    function closeMenu() {
      hamburger.classList.remove('open');
      mobileMenu.classList.add('hidden');
      mobileMenu.classList.remove('flex');
    }

    function handleSend() {
      const firstName = document.getElementById('firstName').value.trim();
      const lastName  = document.getElementById('lastName').value.trim();
      const email     = document.getElementById('email').value.trim();
      const message   = document.getElementById('message').value.trim();

      if (!firstName || !lastName || !email || !message) {
        alert('Please fill in all required fields.');
        return;
      }
      document.getElementById('successMsg').classList.remove('hidden');
      document.getElementById('firstName').value = '';
      document.getElementById('lastName').value  = '';
      document.getElementById('email').value     = '';
      document.getElementById('phone').value     = '';
      document.getElementById('message').value   = '';
    }
  </script>

</body>
</html>
